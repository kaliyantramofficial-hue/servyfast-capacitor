name: Build Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: project

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: project/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Dependencies
        run: npm ci

      - name: Prepare Capacitor Directories
        run: |
          mkdir -p android/app/src/main/assets
          mkdir -p android/app/src/main/res

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Validate Gradle Wrapper
        run: |
          test -f android/gradlew
          test -f android/gradle/wrapper/gradle-wrapper.jar
          chmod +x android/gradlew

      - name: Build Android AAB
        run: |
          cd android
          ./gradlew clean
          ./gradlew bundleRelease --stacktrace --no-daemon

      - name: Verify AAB Exists
        run: |
          ls -la android/app/build/outputs/bundle/release/

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: servyfast-aab
          path: project/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
